name: Unlist NuGet prerelease versions

on:
  workflow_dispatch:
    inputs:
      package_id:
        description: 'NuGet package ID'
        required: true
        type: string
        default: 'Your.Package.Id'
      keep_latest:
        description: 'Keep latest prerelease version'
        required: true
        type: boolean
        default: true

jobs:
  unlist-prereleases:
    runs-on: windows-latest

    steps:
      - name: Unlist listed prerelease versions
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
          PACKAGE_ID: ${{ github.event.inputs.package_id }}
          KEEP_LATEST: ${{ github.event.inputs.keep_latest }}
        run: |
          $source = "https://api.nuget.org/v3/index.json"
          $packageId = $env:PACKAGE_ID.Trim()

          if ([string]::IsNullOrWhiteSpace($packageId)) {
            throw "Package ID is empty."
          }

          $packageIdLower = $packageId.ToLowerInvariant()
          $registrationUrl = "https://api.nuget.org/v3/registration5-gz-semver2/$packageIdLower/index.json"

          Write-Host "Reading registration metadata from $registrationUrl"

          $registration = Invoke-RestMethod -Uri $registrationUrl -ErrorAction Stop

          $entries = @()

          foreach ($page in $registration.items) {
            if ($page.items) {
              $entries += $page.items
            }
            else {
              $pageData = Invoke-RestMethod -Uri $page.'@id' -ErrorAction Stop
              $entries += $pageData.items
            }
          }

          $listedPreReleaseVersions = $entries |
            Where-Object {
              $version = $_.catalogEntry.version
              $listedProperty = $_.catalogEntry.PSObject.Properties["listed"]

              $isPreRelease = $version -like "*-*"
              $isListed = $null -eq $listedProperty -or $_.catalogEntry.listed -eq $true

              $isPreRelease -and $isListed
            } |
            ForEach-Object { $_.catalogEntry.version } |
            Sort-Object { [System.Management.Automation.SemanticVersion]$_ }

          if (-not $listedPreReleaseVersions) {
            Write-Host "No listed prerelease versions found."
            exit 0
          }

          Write-Host "Listed prerelease versions found:"
          $listedPreReleaseVersions | ForEach-Object { Write-Host " - $_" }

          if ($env:KEEP_LATEST -eq "true") {
            $versionsToUnlist = $listedPreReleaseVersions | Select-Object -SkipLast 1
          }
          else {
            $versionsToUnlist = $listedPreReleaseVersions
          }

          if (-not $versionsToUnlist) {
            Write-Host "No prerelease versions to unlist."
            exit 0
          }

          Write-Host "Versions to unlist:"
          $versionsToUnlist | ForEach-Object { Write-Host " - $_" }

          foreach ($version in $versionsToUnlist) {
            Write-Host "Unlisting $packageId $version"

            dotnet nuget delete $packageId $version `
              --source $source `
              --api-key $env:NUGET_API_KEY `
              --non-interactive
          }