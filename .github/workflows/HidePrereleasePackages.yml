name: Unlist NuGet prerelease versions

on:
  workflow_dispatch:
    inputs:
      package_id:
        description: 'NuGet package ID'
        required: true
        type: string
        default: 'Your.Package.Id'
      keep_latest:
        description: 'Keep latest prerelease version'
        required: true
        type: boolean
        default: true

jobs:
  unlist-prereleases:
    runs-on: windows-latest

    steps:
      - name: Unlist prerelease versions
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
          PACKAGE_ID: ${{ github.event.inputs.package_id }}
          KEEP_LATEST: ${{ github.event.inputs.keep_latest }}
        run: |
          $source = "https://api.nuget.org/v3/index.json"
          $packageId = $env:PACKAGE_ID.Trim()

          if ([string]::IsNullOrWhiteSpace($packageId)) {
            throw "Package ID is empty."
          }

          $encodedPackageId = [System.Uri]::EscapeDataString($packageId)
          $searchUrl = "https://azuresearch-usnc.nuget.org/query?q=packageid:$encodedPackageId&prerelease=true&take=1"

          Write-Host "Reading listed versions from $searchUrl"

          $result = Invoke-RestMethod -Uri $searchUrl -ErrorAction Stop

          $package = $result.data | Where-Object { $_.id -eq $packageId } | Select-Object -First 1

          if (-not $package) {
            Write-Host "Package '$packageId' was not found as listed package on nuget.org."
            exit 0
          }

          $preReleaseVersions = $package.versions |
            Where-Object { $_.version -like "*-*" } |
            ForEach-Object { $_.version }

          if ($env:KEEP_LATEST -eq "true") {
            $versionsToUnlist = $preReleaseVersions | Select-Object -SkipLast 1
          }
          else {
            $versionsToUnlist = $preReleaseVersions
          }

          if (-not $versionsToUnlist) {
            Write-Host "No listed prerelease versions to unlist."
            exit 0
          }

          foreach ($version in $versionsToUnlist) {
            Write-Host "Unlisting $packageId $version"

            dotnet nuget delete $packageId $version `
              --source $source `
              --api-key $env:NUGET_API_KEY `
              --non-interactive
          }